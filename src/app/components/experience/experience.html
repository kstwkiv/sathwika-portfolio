<section id="experience" class="section experience">
  <div class="container">
    <div class="section-header" appReveal>
      <span class="section-tag">Experience</span>
      <h2 class="section-title">Where I've Worked</h2>
    </div>

    <div class="timeline">
      <!-- Animated spine line -->
      <div #timelineLine class="timeline-line"></div>

      @for (exp of experience; track exp.company; let i = $index) {
        <div class="timeline-item" [class.right]="i % 2 !== 0"
             appReveal [direction]="i % 2 === 0 ? 'left' : 'right'" [delay]="i * 150">
          <div class="timeline-dot" [style.background]="exp.color"></div>
          <div class="timeline-card">
            <div class="card-header">
              <div class="company-info">
                <h3 class="company">{{ exp.company }}</h3>
                <span class="role">{{ exp.role }}</span>
                <span class="program">{{ exp.program }}</span>
              </div>
              <div class="card-meta">
                <span class="period">{{ exp.period }}</span>
                <span class="type-badge"
                      [style.background]="exp.color + '22'"
                      [style.color]="exp.color">
                  {{ exp.type }}
                </span>
              </div>
            </div>
            <ul class="card-points">
              @for (point of exp.points; track point) {
                <li>{{ point }}</li>
              }
            </ul>
          </div>
        </div>
      }
    </div>
  </div>
</section>
